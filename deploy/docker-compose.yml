# ============================================================
# docker-compose.yml — OncoCollab
# ============================================================
# Démarrage : docker compose up -d
# Arrêt     : docker compose down
# Reset BDD  : docker compose down -v
# ============================================================

services:

  frontend:
    image: monrepo/oncocollab-frontend:latest
    container_name: oncocollab_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - oncocollab

  backend:
    image: monrepo/oncocollab-backend:latest
    container_name: oncocollab_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env.backend
    environment:
      POSTGRES_HOST: postgres
      MONGODB_URI: mongodb://mongo:27017/oncocollab_prerequisites
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - oncocollab
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: oncocollab_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - .env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oncocollab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oncocollab} -d ${POSTGRES_DB:-oncocollab}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:7-jammy
    container_name: oncocollab_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env.mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - oncocollab
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  olga-designer:
    image: monrepo/oncocollab-olga-designer:latest
    platform: linux/amd64
    container_name: oncocollab_olga_designer
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./olga-designer/config/config.json:/usr/share/nginx/html/config/config.json:ro
    depends_on:
      olga-api:
        condition: service_healthy
    networks:
      - oncocollab
      - olga

  olga-admin:
    image: monrepo/oncocollab-olga-admin:latest
    platform: linux/amd64
    container_name: oncocollab_olga_admin
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./olga-designer/config/config.json:/usr/share/nginx/html/config/config.json:ro
    depends_on:
      olga-api:
        condition: service_healthy
    networks:
      - oncocollab
      - olga

  olga-api:
    image: kirito140/olga-backend:latest
    platform: linux/amd64
    container_name: oncocollab_olga_api
    restart: on-failure
    ports:
      - "9091:9091"
    env_file:
      - ./olga-designer/.env.back
    depends_on:
      olga-mysql:
        condition: service_healthy
    volumes:
      - ./olga-designer/config/apiKey.json:/app/config/apiKey.json:ro
    networks:
      - olga
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  olga-mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: oncocollab_olga_mysql
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - ./olga-designer/.env.mysql
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - olga
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  coturn:
    image: coturn/coturn
    container_name: oncocollab_coturn
    restart: unless-stopped
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "50000-50020:50000-50020/udp"
    env_file:
      - .env
    environment:
      - EXTERNAL_IP=${EXTERNAL_IP:-127.0.0.1}
    command:
      - -n
      - --log-file=stdout
      - --min-port=50000
      - --max-port=50020
      - --listening-ip=0.0.0.0
      - --external-ip=${EXTERNAL_IP:-127.0.0.1}
      - --realm=oncocollab
      - --user=${TURN_USERNAME}:${TURN_PASSWORD}
      - --lt-cred-mech
    networks:
      - oncocollab

volumes:
  postgres_data:
  mongo_data:
  mysql_data:

networks:
  oncocollab:
    driver: bridge
    name: oncocollab_network
  olga:
    driver: bridge
    name: olga_network
